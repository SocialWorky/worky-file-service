apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: files-pvc
  namespace: social-network-dev
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: social-network-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      containers:
      - name: file-service
        image: socialworky/worky-file-service-dev:604d3a662a0eab1d0a021ab765f14a627a74c9fe
        ports:
        - containerPort: 3005
        
        env:
        - name: NODE_ENV
          value: "development"
        envFrom:
        - secretRef:
            name: file-service-env-vars
        
        volumeMounts:
        - name: file-storage
          mountPath: /app/uploads
      
      volumes:
      - name: file-storage
        persistentVolumeClaim:
          claimName: files-pvc
