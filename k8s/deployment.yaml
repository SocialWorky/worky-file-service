apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: files-pvc
  namespace: social-network-dev
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
  namespace: social-network-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: file-service
  template:
    metadata:
      labels:
        app: file-service
    spec:
      containers:
      - name: file-service
        image: socialworky/worky-file-service-dev:ef22f88644e067381412ae7cfcb293eb2e46cf81
        ports:
        - containerPort: 3005

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        livenessProbe:
          httpGet:
            path: /health/live
            port: 3005
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3005
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        envFrom:
        - secretRef:
            name: file-service-env-vars

        volumeMounts:
        - name: file-storage
          mountPath: /app/uploads

      volumes:
      - name: file-storage
        persistentVolumeClaim:
          claimName: files-pvc
