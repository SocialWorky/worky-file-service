# --- 1. DISCO DURO PARA REDIS ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-pvc
  namespace: social-network-file-service
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi # Redis no suele necesitar mucho espacio
---
# --- 2. EL MOTOR REDIS ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worky-redis
  namespace: social-network-file-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worky-redis
  template:
    metadata:
      labels:
        app: worky-redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
        volumeMounts:
        - name: redis-storage
          mountPath: /data
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-data-pvc
---
# --- 3. SERVICIO INTERNO (El "Host") ---
apiVersion: v1
kind: Service
metadata:
  name: social-network-redis-service # <--- ¡ESTE SERÁ TU "REDIS_HOST"!
  namespace: social-network-file-service
spec:
  selector:
    app: worky-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
