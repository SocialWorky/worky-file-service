apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data-pvc
  namespace: social-network-dev
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worky-redis
  namespace: social-network-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worky-redis
  template:
    metadata:
      labels:
        app: worky-redis
    spec:
      containers:
      - name: redis
        image: redis:7
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "64Mi"   
            cpu: "50m"       
          limits:
            memory: "256Mi"  
            cpu: "500m"
        envFrom:
        - secretRef:
            name: file-service-env-vars
        volumeMounts:
        - name: redis-storage
          mountPath: /data
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-data-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: social-network-redis-service
  namespace: social-network-dev
spec:
  selector:
    app: worky-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
